services:
  - type: web
    name: edgel-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: EDGEL_HOST
        value: 0.0.0.0
      - key: EDGEL_ALLOWED_ORIGIN
        sync: false
      - key: NEUROEDGE_API_URL
        sync: false
